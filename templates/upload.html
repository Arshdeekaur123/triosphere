<!DOCTYPE html>
<html>
<head>
  <title>Analyze Skills</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  .bg-image {
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                url('/img/upload.png') no-repeat center center/cover;
    height: 100vh;
    width: 100%;
  }
</style>
</head>

<body class="bg-dark text-white">


<!-- FULL BACKGROUND -->
<div class="bg-image d-flex justify-content-center align-items-center">

  <!-- FORM CARD -->
  <div class="card shadow-lg p-4 rounded-4" style="width:400px;">

    <h3 class="text-center mb-4">🚀 Analyze Your Skills</h3>

  <form action="/predict" method="post" enctype="multipart/form-data">
      <!-- STEP 1 -->
      <div class="step">
        <label class="form-label fw-bold">👋 What's your name?</label>
        <input type="text" name="name" class="form-control mb-3" placeholder="Enter your name">
        <button type="button" class="btn btn-primary w-100" onclick="nextStep()">Next</button>
      </div>

      <!-- STEP 2 -->
      <div class="step d-none">
        
        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
          <button type="button" class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="step d-none">
        <label class="form-label fw-bold">🎯 What are you looking for?</label>
        <select class="form-select mb-3">
          <option>Internship</option>
          <option>Full-Time Job</option>
          <option>Both</option>
        </select>

        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
          <button type="button" class="btn btn-primary" onclick="nextStep()">Next</button>
        </div>
      </div>

      <!-- STEP 4 -->
      <div class="step d-none">
        <label class="form-label fw-bold">📄 Upload your resume</label>
<input type="file" name="resume" class="form-control mb-3" required>
        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" onclick="prevStep()">Back</button>
          <button type="submit" class="btn btn-success">Get Results</button>
          <div id="spinner" class="text-center my-5" style="display:none;">
  <div class="spinner-border text-warning" role="status"></div>
  <p>Analyzing your resume...</p>
</div>
        </div>
      </div>

    </form>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".step");

function showStep(index) {
  steps.forEach((step, i) => {
    step.classList.add("d-none");
    if (i === index) step.classList.remove("d-none");
  });
}

function nextStep() {
  currentStep++;
  showStep(currentStep);
}

function prevStep() {
  currentStep--;
  showStep(currentStep);
}
document.querySelector("form").addEventListener("submit", function(){
  document.querySelector(".card").style.display = "none";
  document.getElementById("spinner").style.display = "block";
});
</script>

</body>
</html>
